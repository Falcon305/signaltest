name: demo
on:
  pull_request:
    paths:
      - examples/regression/**
      - .github/workflows/demo.yml
      - action.yml

jobs:
  signaltest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          install: pip install -e .
          paths: examples/regression
